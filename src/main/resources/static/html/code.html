<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CodeMind — 코딩 연습</title>
  <!-- 분리된 CSS 불러오기 -->
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo"><div class="nav-logo-dot"></div> CodeMind</a>
    <div class="nav-links">
      <a href="ai.html" class="nav-link">🤖 AI 튜터</a>
      <a href="note.html" class="nav-link">📝 오답노트</a>
      <a href="code.html" class="nav-link active">💻 코딩 연습</a>
      <a href="board.html" class="nav-link">👥 커뮤니티</a>
    </div>
  </nav>

  <div style="padding: 30px 40px;">
    <h2>💻 코딩 연습</h2><br>
    <div class="code-layout">
      <!-- 1. PDF -->
      <div class="panel-box">
        <div class="panel-header">📄 문제 PDF
          <label class="btn-run" style="margin-left:auto; cursor:pointer;">+ 업로드
            <input type="file" id="pdfUpload" accept="application/pdf" style="display:none;">
          </label>
        </div>
        <div id="pdfPlaceholder" style="padding:20px; text-align:center;">PDF를 올려주세요.</div>
        <iframe id="pdfViewer" style="width:100%; height:100%; display:none;"></iframe>
      </div>

      <!-- 2. 에디터 -->
      <div class="panel-box">
        <div class="panel-header">
          <select id="languageSelect">
            <option value="71">Python</option>
            <option value="63">JavaScript</option>
            <option value="62">Java</option>
            <option value="50">C</option>
            <option value="54">C++</option>
          </select>
          <button class="btn-run" onclick="runCodeWithJudge0()">▶ 실행</button>
        </div>

        <div id="codeEditor" class="code-editor"></div>

        <div style="border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px;">
          <span style="font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px;">테스트 케이스 입력 (stdin)</span>
          <textarea id="customInput" style="width: 100%; height: 60px; background: var(--bg2); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; resize: vertical; font-family: var(--font-mono); font-size: 13px;" placeholder="입력값이 필요한 경우 여기에 작성하세요"></textarea>
        </div>

        <div id="editorOutput" class="editor-output">실행 결과를 대기중입니다.</div>
      </div>

      <!-- 3. AI -->
      <div class="panel-box" style="flex: 1.2;">
        <div class="panel-header">🤖 AI Copilot & 디버거</div>
            
        <div style="display: flex; flex-direction: column; gap: 16px; padding: 10px; flex: 1; overflow: hidden;">
          
          <div>
            <h3 style="margin: 0 0 12px 0; color: var(--accent); font-size: 16px;">🔍 실행 흐름 시각화</h3>
            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px;">
              <button id="btnPrev" class="btn-run" style="padding: 6px 10px; font-size: 13px;">◀ 이전</button>
              <span id="stepCounter" style="color: var(--text2); font-size: 13px; font-weight: bold;">Step 0 / 0</span>
              <button id="btnNext" class="btn-run" style="padding: 6px 10px; font-size: 13px;">다음 ▶</button>
              <button id="btnReset" class="btn-login" style="margin-left: auto; padding: 6px 10px; font-size: 13px;">↻ 초기화</button>
            </div>
            <button id="btnAskAI" style="width: 100%; background-color: var(--accent); color: #000; font-weight: bold; border: none; padding: 8px; border-radius: 6px; cursor: pointer;">
              🤖 이 단계 분석 요청
            </button>
          </div>
        
          <div id="trackerCodeDisplay" style="flex: 1; overflow-y: auto; overflow-x: auto; width: 100%; background: var(--bg2); padding: 12px 8px; border-radius: 8px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; border: 1px solid var(--border); white-space: pre; box-sizing: border-box;">
            코드를 입력하고 실행해주세요.
          </div>
        
          <div style="flex-shrink: 0; max-height: 160px; overflow-y: auto; width: 100%; background: var(--surface); padding: 16px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box;">
            <h4 style="margin: 0 0 12px 0; font-size: 14px;">메모리 변수 상태</h4>
            <div id="trackerMemoryDisplay" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px;">
              <span style="color: var(--text2); font-size: 13px;">데이터 없음</span>
            </div>
          </div>
        
          <div style="flex-shrink: 0; max-height: 120px; overflow-y: auto; background: var(--bg3); padding: 12px; border-radius: 6px; border: 1px solid var(--border);">
            <h5 style="margin: 0 0 8px 0; color: var(--accent);">🤖 AI 튜터 피드백</h5>
            <p id="aiResponseText" style="margin: 0; font-size: 13px; line-height: 1.5; color: var(--text2);">
              디버그 시작 후 알고 싶은 단계에서 [이 단계 분석 요청] 버튼을 눌러보세요.
            </p>
          </div>
          
        </div>
      </div>
      
  <!-- 공통 토스트 -->
  <div id="toast" class="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

  <!-- 분리된 JS 파일들 불러오기 -->
  <script src="../js/common.js"></script>
  <script src="../js/code.js"></script>
</body>
</html>
